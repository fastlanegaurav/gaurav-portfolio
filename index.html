<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gaurav Kumar Singh — DevSecOps Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Bricolage+Grotesque:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --blue:#1a6bfa;
  --bg:#ffffff;
  --text:#1a1a1a;
}

body{
  font-family:'Bricolage Grotesque',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* DARK MODE */
body.dark{
  --bg:#0a0a0a;
  --text:#f5f5f5;
}

/* PROGRESS */
#progress{
  position:fixed;
  top:0;
  height:3px;
  background:var(--blue);
  width:0%;
  z-index:9999;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:16px 40px;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(10px);
}

body.dark nav{background:rgba(0,0,0,0.8)}

nav a{margin:0 10px;text-decoration:none;color:var(--text)}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:space-around;
  padding-top:80px;
}

.hero h1{font-size:42px}

/* BUTTON */
.btn{
  background:var(--blue);
  color:#fff;
  padding:12px 20px;
  border-radius:30px;
  text-decoration:none;
  display:inline-block;
  margin-top:20px;
}

/* CURSOR */
.cursor{
  position:fixed;
  width:20px;height:20px;
  background:rgba(26,107,250,0.3);
  border-radius:50%;
  pointer-events:none;
}

/* CHATBOT */
.chat-btn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--blue);
  color:#fff;
  padding:14px;
  border-radius:50%;
  cursor:pointer;
}

.chat-box{
  position:fixed;
  bottom:80px;
  right:20px;
  width:300px;
  height:380px;
  background:#fff;
  border-radius:16px;
  display:none;
  flex-direction:column;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.chat-box.dark{background:#111;color:#fff}

.chat-messages{
  flex:1;
  padding:10px;
  overflow-y:auto;
  font-size:14px;
}

.chat-input{
  display:flex;
  border-top:1px solid #ddd;
}

.chat-input input{
  flex:1;
  border:none;
  padding:10px;
}

.chat-input button{
  background:var(--blue);
  color:white;
  border:none;
  padding:10px;
}

.msg{
  margin:6px 0;
}

.user{color:blue}
.bot{color:green}
</style>
</head>

<body>

<div id="progress"></div>

<nav>
  <div>Gaurav.</div>
  <div>
    <a href="#">About</a>
    <a href="#">Work</a>
    <button id="toggle">🌙</button>
  </div>
</nav>

<section class="hero">

<div>
  <h1 id="typing">Loading...</h1>
  <a href="#" class="btn">View Work</a>
</div>

<div>
<lottie-player 
src="https://lottie.host/6f0c3f9c-0b6c-4b0e-8c9f-5b4d2a0c9e60/animation.json"
background="transparent"
speed="1"
style="width:280px;height:280px;"
loop autoplay>
</lottie-player>
</div>

</section>

<!-- CHATBOT -->
<div class="chat-btn" id="chatToggle">💬</div>

<div class="chat-box" id="chatBox">
  <div class="chat-messages" id="messages"></div>
  <div class="chat-input">
    <input id="input" placeholder="Ask about me...">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<footer style="text-align:center;padding:40px;">
© 2026 Gaurav Kumar Singh
</footer>

<script>
document.addEventListener("DOMContentLoaded",()=>{

/* PROGRESS */
window.addEventListener('scroll',()=>{
  const s=(window.scrollY/(document.body.scrollHeight-window.innerHeight))*100;
  document.getElementById('progress').style.width=s+"%";
});

/* DARK MODE */
toggle.onclick=()=>document.body.classList.toggle('dark');

/* CURSOR */
const c=document.createElement('div');
c.className='cursor';
document.body.appendChild(c);

document.addEventListener('mousemove',e=>{
  c.style.left=e.clientX+'px';
  c.style.top=e.clientY+'px';
});

/* TYPING */
const texts=[
"Building resilient infrastructure",
"Scaling DevOps globally",
"Automating cloud systems"
];

let i=0,j=0,del=false;

function type(){
  let t=texts[i];
  if(!del){j++; if(j===t.length) del=true;}
  else{j--; if(j===0){del=false;i=(i+1)%texts.length;}}
  typing.textContent=t.substring(0,j);
  setTimeout(type,del?40:80);
}
type();

/* CHATBOT */
chatToggle.onclick=()=>{
  chatBox.style.display=chatBox.style.display==='flex'?'none':'flex';
  chatBox.style.display='flex';
};

});

function sendMsg(){
  const input=document.getElementById('input');
  const msg=input.value.toLowerCase();
  const box=document.getElementById('messages');

  box.innerHTML+=`<div class="msg user">You: ${msg}</div>`;

  let reply="I'm Gaurav's assistant.";

  if(msg.includes("skills")) reply="AWS, Kubernetes, Terraform, CI/CD.";
  else if(msg.includes("experience")) reply="3+ years DevSecOps experience.";
  else if(msg.includes("contact")) reply="Email: gaurav04099@gmail.com";
  else if(msg.includes("project")) reply="Built CI/CD pipelines & serverless systems.";

  box.innerHTML+=`<div class="msg bot">Bot: ${reply}</div>`;
  input.value="";
}
</script>

</body>
</html>
