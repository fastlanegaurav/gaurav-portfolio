<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaurav Kumar Singh — DevSecOps Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Bricolage+Grotesque:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --blue:#1a6bfa;
  --bg:#ffffff;
  --text:#1a1a1a;
}

body{
  font-family:'Bricolage Grotesque',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* DARK MODE */
body.dark{
  --bg:#0a0a0a;
  --text:#f5f5f5;
}

/* PROGRESS BAR */
#progress{
  position:fixed;
  top:0;
  left:0;
  height:3px;
  background:var(--blue);
  width:0%;
  z-index:9999;
}

/* CURSOR */
.cursor{
  position:fixed;
  width:20px;height:20px;
  border-radius:50%;
  background:rgba(26,107,250,0.3);
  pointer-events:none;
  transform:translate(-50%,-50%);
}

/* NAV */
nav{
  position:fixed;
  top:0;width:100%;
  display:flex;
  justify-content:space-between;
  padding:16px 40px;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(10px);
}

body.dark nav{
  background:rgba(10,10,10,0.8);
}

nav a{color:var(--text);text-decoration:none;margin:0 10px}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:space-around;
  padding-top:80px;
}

.hero h1{
  font-size:48px;
  max-width:400px;
}

/* BUTTON */
.btn{
  background:var(--blue);
  color:white;
  padding:12px 20px;
  border-radius:30px;
  text-decoration:none;
  display:inline-block;
  margin-top:20px;
}

/* LOTTIE */
.hero-visual{
  display:flex;
  align-items:center;
  justify-content:center;
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
}
</style>
</head>

<body>

<div id="progress"></div>

<nav>
  <div>Gaurav.</div>
  <div>
    <a href="#">About</a>
    <a href="#">Work</a>
    <button id="toggle">🌙</button>
  </div>
</nav>

<section class="hero">

<div>
  <h1 id="typing"></h1>
  <a href="#" class="btn">View Work</a>
</div>

<div class="hero-visual">
  <lottie-player 
    src="https://assets10.lottiefiles.com/packages/lf20_9cyyl8i7.json"
    background="transparent"
    speed="1"
    style="width:300px;height:300px;"
    loop autoplay>
  </lottie-player>
</div>

</section>

<footer>
© 2026 Gaurav Kumar Singh
</footer>

<script>

/* SCROLL PROGRESS */
window.addEventListener('scroll',()=>{
  const scrolled=(window.scrollY/(document.body.scrollHeight-window.innerHeight))*100;
  document.getElementById('progress').style.width=scrolled+"%";
});

/* DARK MODE */
document.getElementById('toggle').onclick=()=>{
  document.body.classList.toggle('dark');
};

/* CURSOR */
const cursor=document.createElement('div');
cursor.classList.add('cursor');
document.body.appendChild(cursor);

document.addEventListener('mousemove',e=>{
  cursor.style.left=e.clientX+'px';
  cursor.style.top=e.clientY+'px';
});

/* TYPING */
const texts=[
"Building resilient infrastructure",
"Scaling DevOps globally",
"Automating cloud systems"
];

let i=0,j=0,current="",deleting=false;

function type(){
  current=texts[i];

  if(!deleting){
    j++;
    if(j===current.length) deleting=true;
  }else{
    j--;
    if(j===0){
      deleting=false;
      i=(i+1)%texts.length;
    }
  }

  document.getElementById("typing").textContent=current.substring(0,j);
  setTimeout(type,deleting?40:80);
}
type();

</script>

</body>
</html>
